name: Update PSE Prices

on:
  schedule:
    - cron: '0 * * * *'   # Every hour on the hour
  workflow_dispatch:        # Also lets you trigger it manually from GitHub

permissions:
  contents: write           # Needed to commit prices.json back to repo

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance --quiet

      - name: Fetch PSE prices
        run: python update_prices.py

      - name: Commit prices.json
        run: |
          git config user.name "PSE Price Bot"
          git config user.email "bot@github.com"
          git add prices.json
          git diff --staged --quiet && echo "No price changes" || (git commit -m "Update PSE prices" && git push)
